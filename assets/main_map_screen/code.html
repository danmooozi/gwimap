<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden h-screen flex flex-col">
<!-- Top AppBar -->
<header class="bg-surface/90 dark:bg-surface/90 backdrop-blur-xl border-b border-outline-variant/20 shadow-[0_4px_20px_rgba(0,0,0,0.5)] docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-margin-mobile h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="ghost">mist</span>
<h1 class="font-headline-lg-mobile text-primary drop-shadow-[0_0_8px_rgba(0,230,21,0.6)] animate-pulse">Gwi-Map</h1>
</div>
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl" data-icon="search">search</span>
</button>
</header>
<!-- Main Content: Map Canvas -->
<main class="flex-1 relative overflow-hidden">
<!-- CRT Screen Effect Layer -->
<div class="absolute inset-0 z-40 crt-overlay opacity-30 pointer-events-none"></div>
<div class="absolute inset-0 z-40 grain pointer-events-none"></div>
<!-- The Map -->
<div class="absolute inset-0 bg-surface-container-lowest">
<img class="w-full h-full object-cover grayscale brightness-50 contrast-125" data-alt="A dark, desaturated high-contrast satellite view of a dense metropolitan area at night. The city grid is illuminated by faint, eerie blue and green bioluminescent-style street lights. The overall aesthetic is gritty, reminiscent of a retro analog horror CCTV feed with subtle digital noise and scanning lines. Deep black shadows dominate the cityscape, creating a mysterious and haunted atmosphere." data-location="Seoul" src="https://lh3.googleusercontent.com/aida-public/AB6AXuArmxOmhFpJNxPPOIGzUWfCsl8mJgLngW7NdGsUTkYhkL6ND3HhsW1rdEo_ICg2YoJ1uSdn3ieKUB0BGytWF8fZM6WBOJx6nrhdhdkM0t8wbquzb23YvbxGljn99I-odt2KRoRUsTlCMeWT7vdyaE8ErE6-WdKrWAggB8tEuF5QraUIX9ildVWtj2JI0EC8XX0RiHaMED67QJGSN3KUM1S6CEvXk2OV4A6ldg2EH-5jAPhB49Nvl1sdICqWMJrhdpb0uVeS15MW0TiM"/>
<!-- Map Markers -->
<!-- LV 3 High Danger Marker -->
<div class="absolute top-[35%] left-[45%] group cursor-pointer z-10">
<div class="relative">
<div class="absolute inset-0 bg-error animate-ping rounded-full opacity-75 blur-md"></div>
<div class="w-8 h-8 bg-error shadow-[0_0_20px_#ffb4ab] rounded-full flex items-center justify-center border-2 border-primary-container relative z-10">
<span class="material-symbols-outlined text-background text-lg" data-icon="skull" data-weight="fill">skull</span>
</div>
</div>
</div>
<!-- LV 1 Low Danger Marker -->
<div class="absolute top-[60%] left-[20%] group cursor-pointer z-10">
<div class="relative">
<div class="w-6 h-6 bg-primary-container shadow-[0_0_15px_#00e615] rounded-full flex items-center justify-center border-2 border-surface relative z-10">
<span class="material-symbols-outlined text-on-primary-container text-sm" data-icon="mystery">mystery</span>
</div>
</div>
</div>
<!-- LV 2 Mid Danger Marker -->
<div class="absolute top-[20%] left-[75%] group cursor-pointer z-10">
<div class="relative">
<div class="w-7 h-7 bg-secondary-container shadow-[0_0_15px_#a100f0] rounded-full flex items-center justify-center border-2 border-on-secondary-container relative z-10">
<span class="material-symbols-outlined text-on-secondary-container text-base" data-icon="detector_status">detector_status</span>
</div>
</div>
</div>
</div>
<!-- Floating UI Elements -->
<div class="absolute top-4 right-4 z-30 flex flex-col gap-2">
<button class="w-12 h-12 bg-surface-container-high/80 backdrop-blur-md rounded-xl border border-outline-variant/30 flex items-center justify-center text-primary shadow-xl">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 bg-surface-container-high/80 backdrop-blur-md rounded-xl border border-outline-variant/30 flex items-center justify-center text-primary shadow-xl">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
<!-- Slide-up Spot Summary Card -->
<div class="absolute bottom-4 left-4 right-4 z-40">
<div class="bg-surface-container/95 dark:bg-surface-container/95 backdrop-blur-2xl rounded-2xl border border-outline-variant/50 shadow-[0_-8px_30px_rgba(0,0,0,0.8)] overflow-hidden transition-transform duration-500 translate-y-0">
<div class="p-4 flex gap-4 items-start">
<!-- Spot Photo -->
<div class="w-24 h-24 rounded-lg overflow-hidden shrink-0 border border-outline-variant/40 relative">
<img class="w-full h-full object-cover" data-alt="A grainy, low-light photograph of a dilapidated, abandoned colonial-style building shrouded in thick fog. The windows are dark and jagged like hollow eyes, and the surrounding overgrown vegetation looks twisted and unnatural. The lighting is an eerie pale green, suggesting a supernatural or radioactive presence. The image quality mimics an old VHS tape with visible tracking lines and chromatic aberration on the edges." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKg6VyRrZnw56WZ5YkQ1qFwCLMDDnU8rcKZBid3Ajnb8wvu3uGbBODGkqunJl-6ilmwcla5VGFS2NpAi8kxnsNhbbIQfxMSqhOj8xbtQxwcVB7vtFzQuc9hLNtqMWGqfICxLqyw2s5vQ0V36dGm-IofTSYAGZhc5eCKP7pX8C6v7YECYR32ZMkE1YQcacZgb0BDwU7R9bKFicpxSXOkpZc5OzSTiyOaq3iLDJD0BbL66XNCKWnAyqbLoSM9mC1MKXYcgNFA-v_J2et"/>
<div class="absolute top-1 left-1 bg-error text-on-error font-label-sm text-[10px] px-1.5 py-0.5 rounded uppercase tracking-wider">Lv.3 Danger</div>
</div>
<!-- Spot Info -->
<div class="flex-1 flex flex-col h-24">
<div class="flex justify-between items-start mb-1">
<h3 class="font-headline-lg-mobile text-primary glitch-text">폐교된 수련원 본관</h3>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="bookmark">bookmark</span>
</div>
<div class="flex items-center gap-1.5 text-on-surface-variant font-label-sm mb-auto">
<span class="material-symbols-outlined text-sm text-primary" data-icon="visibility">visibility</span>
<span>지금 12명이 이 주변에 있어요</span>
</div>
<div class="flex gap-2">
<span class="px-2 py-0.5 bg-surface-container-high rounded border border-outline-variant/30 font-label-sm text-[10px] text-secondary">#폴터가이스트</span>
<span class="px-2 py-0.5 bg-surface-container-high rounded border border-outline-variant/30 font-label-sm text-[10px] text-secondary">#심야_출몰</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="px-4 pb-4 flex gap-2">
<button class="flex-1 h-10 bg-primary text-on-primary rounded-lg font-label-sm flex items-center justify-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-lg" data-icon="navigation">navigation</span>
                        길 찾기
                    </button>
<button class="w-10 h-10 bg-surface-container-highest flex items-center justify-center rounded-lg border border-outline-variant text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-surface-container/95 dark:bg-surface-container/95 backdrop-blur-2xl fixed bottom-0 w-full z-50 rounded-t-xl border-t border-outline-variant/30 shadow-[0_-8px_30px_rgba(0,0,0,0.8)] flex justify-around items-center h-20 pb-safe px-base">
<!-- 지도 (Active) -->
<a class="flex flex-col items-center justify-center text-primary drop-shadow-[0_0_5px_rgba(0,230,21,0.8)] hover:text-primary transition-all active:translate-y-[-2px] duration-200" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="map" data-weight="fill">map</span>
<span class="font-label-sm text-label-sm">지도</span>
</a>
<!-- 탐색 -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all active:translate-y-[-2px] duration-200" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="leaderboard">leaderboard</span>
<span class="font-label-sm text-label-sm">탐색</span>
</a>
<!-- 제보 -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all active:translate-y-[-2px] duration-200" href="#">
<div class="w-12 h-12 -mt-6 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container shadow-[0_0_15px_#00e615]">
<span class="material-symbols-outlined text-3xl" data-icon="add_circle">add_circle</span>
</div>
<span class="font-label-sm text-label-sm mt-1">제보</span>
</a>
<!-- 마이 -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all active:translate-y-[-2px] duration-200" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">마이</span>
</a>
</nav>
</body></html>
